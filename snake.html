<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }
    h1 { color: #00ff88; margin-bottom: 10px; text-shadow: 0 0 10px #00ff8855; }
    #score { font-size: 1.2rem; margin-bottom: 15px; color: #ff6b6b; }
    canvas {
      border: 3px solid #00ff88;
      border-radius: 8px;
      box-shadow: 0 0 30px #00ff8833;
    }
    #controls {
      margin-top: 15px;
      font-size: 0.9rem;
      color: #888;
    }
    #restart {
      margin-top: 15px;
      padding: 10px 25px;
      font-size: 1rem;
      background: #00ff88;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      color: #1a1a2e;
      font-weight: bold;
    }
    #restart:hover { background: #00cc6a; }
  </style>
</head>
<body>
  <h1>🐍 SNAKE GAME</h1>
  <div id="score">Puntuación: 0</div>
  <canvas id="game" width="400" height="400"></canvas>
  <div id="controls">Usa las flechas del teclado o WASD para mover</div>
  <button id="restart" onclick="resetGame()">Reiniciar</button>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');

    const size = 20;
    let snake, dir, food, score, gameOver, speed, interval;

    function init() {
      snake = [{ x: 200, y: 200 }];
      dir = { x: size, y: 0 };
      score = 0;
      gameOver = false;
      speed = 100;
      placeFood();
      updateScore();
    }

    function placeFood() {
      food = {
        x: Math.floor(Math.random() * (canvas.width / size)) * size,
        y: Math.floor(Math.random() * (canvas.height / size)) * size
      };
    }

    function updateScore() {
      scoreEl.textContent = `Puntuación: ${score}`;
    }

    function draw() {
      ctx.fillStyle = '#16213e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#ff6b6b';
      ctx.beginPath();
      ctx.arc(food.x + size/2, food.y + size/2, size/2 - 2, 0, Math.PI * 2);
      ctx.fill();

      snake.forEach((part, i) => {
        ctx.fillStyle = i === 0 ? '#00ff88' : '#00cc6a';
        ctx.fillRect(part.x, part.y, size - 2, size - 2);
        if (i === 0) {
          ctx.fillStyle = '#1a1a2e';
          ctx.fillRect(part.x + 4, part.y + 4, 4, 4);
          ctx.fillRect(part.x + 10, part.y + 4, 4, 4);
        }
      });

      if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#ff6b6b';
        ctx.font = 'bold 30px Segoe UI';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2 - 20);
        ctx.font = '20px Segoe UI';
        ctx.fillStyle = '#eee';
        ctx.fillText(`Puntuación: ${score}`, canvas.width/2, canvas.height/2 + 15);
        ctx.fillText('Presiona ESPACIO o reinicia', canvas.width/2, canvas.height/2 + 45);
      }
    }

    function update() {
      if (gameOver) return;

      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height) {
        gameOver = true;
        draw();
        return;
      }

      for (let part of snake) {
        if (head.x === part.x && head.y === part.y) {
          gameOver = true;
          draw();
          return;
        }
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 10;
        updateScore();
        placeFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function resetGame() {
      clearInterval(interval);
      init();
      interval = setInterval(update, speed);
      draw();
    }

    document.addEventListener('keydown', (e) => {
      if (gameOver && e.code === 'Space') {
        resetGame();
        return;
      }

      switch(e.key) {
        case 'ArrowUp': case 'w': case 'W':
          if (dir.y !== size) dir = { x: 0, y: -size };
          break;
        case 'ArrowDown': case 's': case 'S':
          if (dir.y !== -size) dir = { x: 0, y: size };
          break;
        case 'ArrowLeft': case 'a': case 'A':
          if (dir.x !== size) dir = { x: -size, y: 0 };
          break;
        case 'ArrowRight': case 'd': case 'D':
          if (dir.x !== -size) dir = { x: size, y: 0 };
          break;
      }
    });

    init();
    interval = setInterval(update, speed);
    draw();
  </script>
</body>
</html>
