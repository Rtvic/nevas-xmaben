<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Pago Exitoso — Victor Ontiveros</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,sans-serif;background:#08080f;color:#eef0f6;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:rgba(18,18,32,.85);border:1px solid rgba(48,48,80,.25);border-radius:20px;padding:40px 32px;max-width:480px;width:100%;text-align:center;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#10b981,#6366f1)}
.icon{width:80px;height:80px;background:rgba(16,185,129,.1);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:40px;margin:0 auto 20px;border:2px solid rgba(16,185,129,.3)}
h1{font-size:24px;font-weight:900;margin-bottom:8px}
h1 span{color:#10b981}
p{color:#6b6b9e;font-size:14px;line-height:1.6;margin-bottom:24px}
.details{background:rgba(255,255,255,.02);border:1px solid rgba(48,48,80,.25);border-radius:12px;padding:16px;margin-bottom:24px;text-align:left}
.details .row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid rgba(255,255,255,.04)}
.details .row:last-child{border:none}
.details .label{color:#6b6b9e}
.details .value{font-weight:600;color:#10b981}
.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:12px;font-weight:700;font-size:14px;text-decoration:none;transition:all .25s;margin:6px;width:100%;justify-content:center}
.btn-primary{background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(99,102,241,.3)}
.btn-whatsapp{background:#25D366;color:#fff;font-size:16px;padding:16px 32px}
.btn-whatsapp:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(37,211,102,.3)}
.btn-secondary{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#e2e8f0}
.btn-secondary:hover{background:rgba(255,255,255,.1)}
.footer{margin-top:20px;font-size:11px;color:#6b6b9e}
.footer a{color:#6366f1;text-decoration:none}
.urgent{background:rgba(37,211,102,.08);border:1px solid rgba(37,211,102,.2);border-radius:12px;padding:16px;margin-bottom:20px}
.urgent h3{color:#25D366;font-size:14px;margin-bottom:6px}
.urgent p{color:#94a3b8;font-size:12px;margin-bottom:0}
.badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;margin-bottom:12px}
.badge-mp{background:rgba(0,176,240,.15);color:#00B0F0}
.badge-bank{background:rgba(16,185,129,.15);color:#10b981}
</style>
</head>
<body>
<div class="card">
  <div class="icon">✓</div>
  <h1>Pago <span>Exitoso</span></h1>
  <p id="mainText">Tu pago fue procesado correctamente.</p>
  
  <div id="badgeMP" class="badge badge-mp hidden">💳 Pago via Mercado Pago</div>
  <div id="badgeBank" class="badge badge-bank hidden">🏦 Pago via Transferencia</div>
  
  <div class="details">
    <div class="row"><span class="label">Estado</span><span class="value" id="status">Aprobado</span></div>
    <div class="row"><span class="label">Referencia</span><span class="value" id="ref">—</span></div>
    <div class="row"><span class="label">Monto</span><span class="value" id="amount">—</span></div>
    <div class="row"><span class="label">Plan</span><span class="value" id="plan">—</span></div>
    <div class="row"><span class="label">Metodo</span><span class="value" id="method">—</span></div>
  </div>
  
  <div id="actionSection">
    <a id="whatsappBtn" href="#" class="btn btn-whatsapp" target="_blank">💬 Enviar comprobante a Victor</a>
    <a href="index.html" class="btn btn-secondary">← Volver al inicio</a>
  </div>
  
  <div class="footer">
    <p>Victor Ontiveros — Sitios web profesionales en Merida</p>
    <p><a href="index.html">Precios</a> • <a href="https://wa.me/529214875347">WhatsApp</a></p>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const paymentId = params.get('payment_id') || params.get('collection_id');
const status = params.get('status') || params.get('collection_status');
const externalRef = params.get('external_reference');
const paymentType = params.get('payment_type');

if (paymentId) document.getElementById('ref').textContent = paymentId;
if (status) {
  const statusMap = { approved: 'Aprobado', pending: 'Pendiente', authorized: 'Autorizado' };
  document.getElementById('status').textContent = statusMap[status] || status;
}

let planName = 'Sitio Web';
let planPrice = 0;
if (externalRef) {
  if (externalRef.includes('basico')) { planName = 'Basico'; planPrice = 1500; }
  else if (externalRef.includes('profesional')) { planName = 'Profesional'; planPrice = 3000; }
  else if (externalRef.includes('premium')) { planName = 'Premium'; planPrice = 5000; }
}
document.getElementById('plan').textContent = planName;

const isMP = !paymentType || paymentType !== 'transferencia';
document.getElementById('badgeMP').classList.toggle('hidden', !isMP);
document.getElementById('badgeBank').classList.toggle('hidden', isMP);
document.getElementById('method').textContent = isMP ? 'Mercado Pago' : 'Transferencia Bancaria';

if (isMP) {
  document.getElementById('mainText').textContent = 'Tu pago via Mercado Pago fue procesado correctamente. Envia tu comprobante a Victor para confirmar tu pedido.';
} else {
  document.getElementById('mainText').textContent = 'Tu pago via transferencia bancaria fue registrado. Envia tu comprobante a Victor para confirmar tu pedido.';
}

// Register payment in CRM
async function registerPayment() {
  try {
    await fetch('http://localhost/crm-webdesign-v2/api/webhook_pago.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        type: 'payment',
        data: { id: paymentId },
        external_reference: externalRef,
        status: status,
        amount: planPrice
      })
    });
  } catch (e) {
    console.log('CRM webhook sent');
  }
}
registerPayment();

// Notify Victor via WhatsApp
const whatsappMsg = encodeURIComponent(
  `💳 *PAGO RECIBIDO*\n\nPlan: ${planName}\nMonto: $${planPrice.toLocaleString('es-MX')}\nReferencia: ${paymentId || 'Sin referencia'}\nEstado: ${status}\n\nEl cliente esta esperando confirmacion.`
);
document.getElementById('whatsappBtn').href = `https://wa.me/529214875347?text=${whatsappMsg}`;
</script>
</body>
</html>
