  profesional: "https://www.mercadopago.com.mx/checkout/v1/redirect?pref_id=1306973285-4e09b0b5-0a0e-45e3-ba7b-c1ec3ab29251"
};

let sentStatus = JSON.parse(localStorage.getItem('sentLeads') || '{}');
let currentFilter = 'all';
let currentSearch = '';

function toggleSent(phone) {
  sentStatus[phone] = !sentStatus[phone];
  localStorage.setItem('sentLeads', JSON.stringify(sentStatus));
  render();
}

function filterAll() { currentFilter = 'all'; render(); }
function filterCat(c) { currentFilter = c; render(); }
function filterSearch() { currentSearch = document.getElementById('search').value.toLowerCase(); render(); }

function getMsg(l) {
  return MSG_TEMPLATES[l.categoria] || MSG_TEMPLATES.default;
}

function render() {
  const grid = document.getElementById('leadGrid');
  const filtered = LEADS.filter(l => {
    if (currentFilter !== 'all' && l.categoria !== currentFilter) return false;
    if (currentSearch && !l.nombre.toLowerCase().includes(currentSearch)) return false;
    return true;
  });
  
  let total = 0;
  let sent = 0;
  
  grid.innerHTML = filtered.map(l => {
    const isSent = sentStatus[l.telefono] || false;
    if (isSent) sent++;
    total++;
    const msg = getMsg(l);
    const waUrl = `https://wa.me/${l.telefono}?text=${encodeURIComponent(msg)}`;
    return `<div class="lead" data-phone="${l.telefono}">
      <div class="info">
        <div class="name">${l.nombre}</div>
        <div class="phone">${l.telefono.slice(2)} <span class="cat">${l.categoria}</span></div>
      </div>
      <div style="display:flex;gap:4px;flex-shrink:0">
        <a href="${waUrl}" target="_blank" class="btn btn-wa" onclick="setTimeout(()=>toggleSent('${l.telefono}'),5000)">WA</a>
        <a href="${PAY_LINKS.basico}" target="_blank" class="btn btn-mp">$</a>
      </div>
    </div>`;
  }).join('');
  
  document.getElementById('totalCount').textContent = total;
  document.getElementById('sentCount').textContent = sent;
  const rev = sent * 1499;
  document.getElementById('revenue').textContent = '$' + rev.toLocaleString();
  
  // Update filter buttons
  document.querySelectorAll('.filter').forEach(b => b.classList.remove('active'));
  if (currentFilter === 'all') document.querySelector('.filter-all').classList.add('active');
  else document.querySelectorAll('.filter').forEach(b => { if(b.textContent.toLowerCase().includes(currentFilter)) b.classList.add('active'); });
}

render();
</script>
