<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Pago Fallido — Victor Ontiveros</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,sans-serif;background:#08080f;color:#eef0f6;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:rgba(18,18,32,.85);border:1px solid rgba(48,48,80,.25);border-radius:20px;padding:40px 32px;max-width:480px;width:100%;text-align:center;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#ef4444,#f97316)}
.icon{width:80px;height:80px;background:rgba(239,68,68,.1);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:40px;margin:0 auto 20px;border:2px solid rgba(239,68,68,.3)}
h1{font-size:24px;font-weight:900;margin-bottom:8px}
h1 span{color:#ef4444}
p{color:#6b6b9e;font-size:14px;line-height:1.6;margin-bottom:24px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:12px;font-weight:700;font-size:14px;text-decoration:none;transition:all .25s;margin:6px;width:100%;justify-content:center}
.btn-primary{background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(99,102,241,.3)}
.btn-whatsapp{background:#25D366;color:#fff}
.btn-whatsapp:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(37,211,102,.3)}
.footer{margin-top:20px;font-size:11px;color:#6b6b9e}
.footer a{color:#6366f1;text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="icon">✗</div>
  <h1>Pago <span>No Completado</span></h1>
  <p>El pago no pudo ser procesado. Puedes intentar de nuevo o contactar a Victor por WhatsApp para ayudarte.</p>
  
  <a href="pagar.html" class="btn btn-primary">🔄 Intentar de nuevo</a>
  <a id="whatsappBtn" href="https://wa.me/529214875347?text=Hola%20Victor,%20tuve%20un%20problema%20con%20el%20pago" class="btn btn-whatsapp" target="_blank">💬 Ayuda por WhatsApp</a>
  
  <div class="footer">
    <p>Victor Ontiveros — Sitios web profesionales en Merida</p>
    <p><a href="index.html">Precios</a> • <a href="https://wa.me/529214875347">WhatsApp</a></p>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const errorMsg = params.get('error') || params.get('error_code') || 'Error desconocido';
if (errorMsg !== 'Error desconocido') {
  const whatsappMsg = encodeURIComponent(`Hola Victor, intente pagar pero me salio este error: ${errorMsg}`);
  document.getElementById('whatsappBtn').href = `https://wa.me/529214875347?text=${whatsappMsg}`;
}
</script>
</body>
</html>
